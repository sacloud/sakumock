name: release

# Releases the unified `sakumock` binary. tagpr maintains a release PR for the
# repository (bare vX.Y.Z tags); when that PR is merged, tagpr creates the tag
# and GoReleaser builds the binaries and creates the GitHub Release in the same
# job. Running GoReleaser in the same run avoids the GITHUB_TOKEN limitation
# where a tag pushed by the token does not trigger a new workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: tagpr
        uses: Songmu/tagpr@555e72cee68c09d43dc2337dc9ba890955b630da # v1.19.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .tagpr
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.tagpr.outputs.tag != ''
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # The repository is a single Go module, so the released binary reflects
      # the source of every service at the tagged commit.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        if: steps.tagpr.outputs.tag != ''
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
