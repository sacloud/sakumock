name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...

  objectstorage-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # The object storage data plane is served by an external versitygw process
      # (see objectstorage/dataplane.go). Install the release binary so the
      # data plane end-to-end test runs instead of skipping.
      - name: Install versitygw
        env:
          VERSITYGW_VERSION: v1.5.0
        run: |
          curl -fsSL -o versitygw.tar.gz \
            "https://github.com/versity/versitygw/releases/download/${VERSITYGW_VERSION}/versitygw_${VERSITYGW_VERSION}_Linux_x86_64.tar.gz"
          tar xzf versitygw.tar.gz --strip-components=1 --wildcards '*/versitygw'
          sudo install versitygw /usr/local/bin/versitygw
          versitygw --version
      - name: Object storage data plane test
        run: go test -run TestDataPlane -v ./objectstorage/

  monitoringsuite-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # The telemetry data plane e2e drives the real sacloud-otel-collector (its
      # sacloud exporter) with telemetrygen as the source. Both must be on PATH;
      # the test skips when they are absent (install them locally to run it).
      - name: Install sacloud-otel-collector and telemetrygen
        env:
          OTELCOL_VERSION: v0.7.0
          TELEMETRYGEN_VERSION: v0.142.0
        run: |
          curl -fsSL -o sacloud-otel-collector.tar.gz \
            "https://github.com/sacloud/sacloud-otel-collector/releases/download/${OTELCOL_VERSION}/sacloud-otel-collector_${OTELCOL_VERSION#v}_linux_amd64.tar.gz"
          tar xzf sacloud-otel-collector.tar.gz sacloud-otel-collector
          sudo install sacloud-otel-collector /usr/local/bin/sacloud-otel-collector
          sacloud-otel-collector --version
          go install "github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@${TELEMETRYGEN_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Monitoring suite data plane e2e
        run: go test -tags otelcollector -run TestDataPlaneOtelCollectorE2E -v ./monitoringsuite/

  apprun-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # The AppRun data plane e2e deploys an nginx container via apprun-cli,
      # requests the public URL, and verifies a 200 response. Docker is
      # pre-installed on the runner; apprun-cli is downloaded from its release.
      - name: Install apprun-cli
        env:
          APPRUN_CLI_VERSION: v0.8.0
        run: |
          curl -fsSL -o apprun-cli.tar.gz \
            "https://github.com/fujiwara/apprun-cli/releases/download/${APPRUN_CLI_VERSION}/apprun-cli_${APPRUN_CLI_VERSION}_linux_amd64.tar.gz"
          tar xzf apprun-cli.tar.gz apprun-cli
          sudo install apprun-cli /usr/local/bin/apprun-cli
          apprun-cli --version
      - name: Pull nginx image
        run: docker pull nginx:latest
      - name: AppRun data plane e2e
        run: go test -run TestDataPlaneEndToEnd -v ./apprun/

  terraform-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # terraform_wrapper must be off so the test sees terraform's real exit
      # codes (e.g. `plan -detailed-exitcode` returning 2 for a diff).
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      # Drives `sakumock all` with the sacloud/sakura provider end to end. The
      # provider is fetched from the Terraform Registry, so this job needs network.
      - name: Terraform end-to-end test
        run: go test -tags terraform -v ./test/terraform/
