name: release

# Releases the unified `sakumock` binary. tagpr maintains a release PR for the
# root module (bare vX.Y.Z tags); when that PR is merged, tagpr creates the tag
# and GoReleaser builds the binaries and creates the GitHub Release in the same
# job. Running GoReleaser in the same run avoids the GITHUB_TOKEN limitation
# where a tag pushed by the token does not trigger a new workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: tagpr
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .tagpr
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.tagpr.outputs.tag != ''
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # GoReleaser builds in workspace mode (go.work) so the released binary
      # reflects the source of every service at the tagged commit.
      - uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        if: steps.tagpr.outputs.tag != ''
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
