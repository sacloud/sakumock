name: Data plane e2e

on:
  push:
    branches: [main]
    paths:
      - "objectstorage/**"
      - "monitoringsuite/**"
      - "apprun/**"
      - "apprundedicated/**"
      - "core/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "objectstorage/**"
      - "monitoringsuite/**"
      - "apprun/**"
      - "apprundedicated/**"
      - "core/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  objectstorage-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          mise_toml: |
            [tools]
            "github:versity/versitygw" = "1.5.0"
      - name: Object storage data plane test
        run: go test -run TestDataPlane -v ./objectstorage/

  monitoringsuite-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          mise_toml: |
            [tools]
            "github:sacloud/sacloud-otel-collector" = "0.7.0"
      - name: Install telemetrygen
        env:
          TELEMETRYGEN_VERSION: v0.142.0
        run: |
          go install "github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@${TELEMETRYGEN_VERSION}"
      - name: Monitoring suite data plane e2e
        run: go test -tags otelcollector -run TestDataPlaneOtelCollectorE2E -v ./monitoringsuite/

  apprun-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          mise_toml: |
            [tools]
            "github:fujiwara/apprun-cli" = "0.8.0"
      - name: Pull nginx image
        run: docker pull nginx:latest
      - name: AppRun data plane e2e
        run: go test -run TestDataPlaneEndToEnd -v ./apprun/

  apprun-dedicated-data-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          mise_toml: |
            [tools]
            "github:fujiwara/apprun-dedicated-cli" = "0.1.1"
      - name: Pull nginx image
        run: docker pull nginx:latest
      - name: AppRun Dedicated data plane e2e
        run: go test -run TestDataPlaneEndToEnd -v ./apprundedicated/
