name: release

# Releases the unified `sakumock` binary. tagpr maintains a release PR for the
# repository (bare vX.Y.Z tags); when that PR is merged, tagpr creates the tag
# and GoReleaser builds the binaries and creates the GitHub Release in the same
# job. Running GoReleaser in the same run avoids the GITHUB_TOKEN limitation
# where a tag pushed by the token does not trigger a new workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: write # push the container image to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: tagpr
        uses: Songmu/tagpr@555e72cee68c09d43dc2337dc9ba890955b630da # v1.19.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .tagpr
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.tagpr.outputs.tag != ''
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      # Buildx is required by GoReleaser's `use: buildx` docker builds; QEMU lets
      # the amd64 runner produce the arm64 image variant.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: steps.tagpr.outputs.tag != ''
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: steps.tagpr.outputs.tag != ''
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: steps.tagpr.outputs.tag != ''
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The repository is a single Go module, so the released binary reflects
      # the source of every service at the tagged commit. GoReleaser builds the
      # binaries, then builds and pushes the multi-arch container image to ghcr.io.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        if: steps.tagpr.outputs.tag != ''
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
