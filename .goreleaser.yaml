# Release config for the unified `sakumock` binary.
# A single binary aggregates every service as a subcommand, so the OSS
# (non-Pro) single-target build is sufficient. modernc.org/sqlite is pure Go,
# so CGO is disabled and cross-compilation works for every target.
version: 2

project_name: sakumock

before:
  hooks:
    - go mod download

builds:
  - id: sakumock
    main: ./cmd/sakumock
    binary: sakumock
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: sakumock
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

# Multi-platform container image pushed to ghcr.io. Each entry builds a
# single-arch image from the prebuilt binary (the Dockerfile only COPYs it, so
# no emulation is needed), and docker_manifests combines them into one
# multi-arch tag that `docker pull` resolves per host architecture. (The stable
# dockers/docker_manifests blocks are used rather than the experimental
# dockers_v2, since CI pins GoReleaser to `~> v2` where these remain supported.)
dockers:
  - id: sakumock-amd64
    ids: [sakumock]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-amd64"
      - "ghcr.io/sacloud/sakumock:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/sacloud/sakumock"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: sakumock-arm64
    ids: [sakumock]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-arm64"
      - "ghcr.io/sacloud/sakumock:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/sacloud/sakumock"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  # Variant image bundling versitygw with the Object Storage data plane enabled
  # (Dockerfile.dataplane). versitygw is fetched per arch in a build stage that
  # runs on the build platform, so arm64 still needs no emulation.
  - id: sakumock-dataplane-amd64
    ids: [sakumock]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.dataplane
    use: buildx
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-dataplane-amd64"
      - "ghcr.io/sacloud/sakumock:latest-dataplane-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/sacloud/sakumock"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: sakumock-dataplane-arm64
    ids: [sakumock]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.dataplane
    use: buildx
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-dataplane-arm64"
      - "ghcr.io/sacloud/sakumock:latest-dataplane-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/sacloud/sakumock"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/sacloud/sakumock:{{ .Version }}"
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-amd64"
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sacloud/sakumock:latest"
    image_templates:
      - "ghcr.io/sacloud/sakumock:latest-amd64"
      - "ghcr.io/sacloud/sakumock:latest-arm64"
  - name_template: "ghcr.io/sacloud/sakumock:{{ .Version }}-dataplane"
    image_templates:
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-dataplane-amd64"
      - "ghcr.io/sacloud/sakumock:{{ .Version }}-dataplane-arm64"
  - name_template: "ghcr.io/sacloud/sakumock:latest-dataplane"
    image_templates:
      - "ghcr.io/sacloud/sakumock:latest-dataplane-amd64"
      - "ghcr.io/sacloud/sakumock:latest-dataplane-arm64"

changelog:
  disable: true

release:
  github:
    owner: sacloud
    name: sakumock
  # tagpr creates the GitHub Release as a draft with its generated notes;
  # GoReleaser attaches the binaries to that draft and publishes it. The draft
  # is required because GitHub immutable releases freeze a published release's
  # assets, so assets must be added before publishing.
  mode: keep-existing
  use_existing_draft: true
